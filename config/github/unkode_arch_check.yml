# Copy to .github/workflows/unkode.yml

name: Architecture Check
on:
  pull_request:
    branches: [main]

jobs:
  unkode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/unkode
